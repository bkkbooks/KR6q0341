body:
  text: 釋迦像持錫擎盂示化儀結跏蓮坐又巍巍何須善現更伸請舍衛王城一轍歸古寺瓦礫中瓷佛現光毫相騰騰灰燼間匪金匪玉匪栴檀十成好箇天真佛莫作尋常陶瓦看布袋和尚背負肩擔徒費力時人有幾識機權何如拋却布囊好歸去來兮兜率天踏蘆達磨西來語不契梁王萬頃秋江一葦航祇道懷羞衝浪急誰知入水見人長裴相國山崇十二全黃檗位重三公弼大唐五季隨更炎宋換度泥一笏話頭長嶽知客歸國清煙笻日日渡江皋北送南迎不憚勞何似者回休歇去五峰靜處聽松濤送元寮元別峰見後何曾別明月清風挂杖頭東楚西吳從踏遍太湖依舊跨三州題瑤首座瓢苗集秦城築土杵無漢祖斬蛇劒有鋒拋向扶桑日頭裏唐人誰解辨來蹤趙州七斤衫話七斤衫子出青州一葉舟橫古岸頭日暮途長人不渡何妨載月過滄洲送僧歸雙林省師海門親見海雲師江月團團印夕輝檮樹雙雙同一照何消圓相別呈機和知客到與未到喫茶去和盤托出見情真在家既善迎賓客遍歷何嫌少主人畫雞冠秋花矮矮擁高冠雞頂休爭染血丹天寶盛時無此象不堪寫出與人看木石蒼壁春生氷雪枝夏蟲不敢近根飛石橋南畔先曾見幾樹含秋獨鶴歸送廣維那大音倡出廣長舌楊子江濤撼甕城巖內頭陀驚起定吳中浮佛亦吞聲送珍藏主往來是藏不相瞞西蜀東吳豈兩般庭柏夏炎枝鎖翠井梧秋冷葉飄丹送及侍者雞聲唱徹炎天曉已向聲前契祖機楊子江流東入海臨流未可買舟歸出山相霜宵逃出王宮去凍得雙睛擘不開誤認星兒為正見誑人又出雪山來送杲書記海柳花時出戶迎花曾未老又催程何如南北渡江客兩不相知無怨情送道場春知客之金陵苕水春深碧似苔曾將煮茗接方來六朝豪傑多沉醉喚醒何妨與一杯題龍王請羅漢齋圖龍王宮裏飽香齋渡水穿雲費往來何似凌虗振金錫朝遊南嶽暮天台送澄首座摩訶衍法何言説試假山藤示一機楊子攪乾無滴水炎方散作雪花飛送巖上人拜祖塔道固巖巖不可鑽湘潭樣子亦難傳更尋知識琉璃殿無影樹頭從駕船送璞上人禮祖塔抱璞投師貴琢磨未能成器又如何不妨撥草叩諸祖青塔纍纍鎖緑蘿次韻送雲巖大師權門要路長羈鎖山水清華豈得遊爭似河西間散士五湖風月一笻秋托侍者歸明州座上笑花雙眼活托芳拾秀謾誇奇翻身踏倒長汀子放出中天青鳳兒寄成元章吳楚相分十七年片音曾不到吟邊想知道體無離合月白風清共一天達磨隻履相熊耳峰前示密機何聲何迹到人窺無端逢著嶺頭使一種行藏誰不知梁王對語不投機一葦橫江去似飛可是九年無折合又擕隻履向西歸達磨忌拈香竺乾宗破六師衆震旦花聯五葉芳此日風前追往事令人又費一爐香送安藏主柴片拋下便抽頭活似盤珠不可留鰲頂望窮雙眼老海東那得共乘舟半身達磨西來東土為傳心心作麼傳謾誑人語觸梁王無避處至今不敢露全身贊日本松嶺和尚松嶺孤高當海東四方莫不仰宗風道場三坐皆昌化正續綿綿起少嵩送相士象緯能從掌上分星禽尤善化中論古今窮達無逾此獨許兼通天地根送基上人道學要知弓矢學由基不許奪機先千鈞一發看他日射破虗空作兩邊送欽書記高流高業衆難攀文海寬如法海寬一筆掃乾楊子水禪林宜作翰林官送章藏主歸閩真教無文章句全長江萬里印長天一毛吞却絶涓滴漲起謝郎破釣船題周武王扇暍人圖五帝三皇并列代山河宮闕總成塵何如周武遺芳澤萬古蘿圖寫暍人漁隱圖胸中藻繡足經綸溪畔竿絲甘隱淪盛代那容抱奇士高居獨老百年春贊中峰和尚師子巖前放鐵吞却南山白額蟲大地叢林無寸土十方世界絶狐蹤次韻送浩侍者歸省獨孤和尚鉗鎚妙密令森嚴非但宗通説亦兼是父固應生是子如何逃逝遠咨參跋中峰和尚法語并書二劫初鈴子未嘗陳王庫刀兒新發硎兩物將為一物用若非好手謾勞形天目山中幻住翁暫時隔濶想書通況歸真寂年深遠怎不臨文懷德風有上人禮塔蘇州有兮常州有知有非親用要親八十四人草窠裏杖頭敲出玉麒麟墨梅西湖和靖歸三島南嶽華光去九州踈影橫斜煙水遠一枝留得舊風流龍翔輝藏主下遺書呈偈用韻答之三五千餘卷總間間文錦藏胸不露斑江上忽投天外句喚回拾得與寒山龍岡道樹未飛灰五葉花從劫外開無限香風生下載大聲千古挾春雷曠劫論來豈渺茫目前不外威音王是曾滅度非滅度一任諸方自抑揚題日觀蒲萄龍鬚馬乳顆纍纍總道流沙將到時誰識竺天涼月夜樽前分得雨中枝題喜鵲二門有喜將至雙聲先報及墨翎藏雪幹豈善翔而集枝枝無緑葉花下謾偷身喜近能先兆寧知有弋人容齋號并序空相之大含容萬象而萬象不能以窒塞故運行四時而得全其氣心體之大含容萬法而萬法不能以雜壞故應接諸緣而得全其音趙實甫處士名智大非達斯旨具斯智何其取斯耶故稱容齋為宜仍訂以章句云囊括森羅曾不逼縱橫妙用絶危機高居一室誰為伴喚起巢由此共歸歲次辛巳年七十三山靈預報十月內山門有災九月二十八日即退院圖免災上堂白衆云山僧今年七十三有難將臨十月間老病在身難任重何如卸却伴雲間既而寺衆不信至十月初四日首座孟領大衆同到退居再三懇留不容退去因勉從請再上方丈至是月二十七日晚果災不救致墮劫灰今越三年矣并志示衆瓦礫堆中獨奮身頭蒙白雪面蒙塵七旬有六猶還債笑倒江邊幾木人詩上丞相代疏大人大用絶殊封蕩蕩山河一轍通扶日長明俱照耀補天不漏永帡幪獨憐梵剎難逃劫雙朵浮圖亦化空安得轉鈞追舊觀千秋萬歲頌元功謝囊八同知江寺昔年遭劫火今朝賴掃劫灰空浮圖載要分雲表梵剎仍瞻湧浪中插竹賢于非具智聚沙童子豈全功得公相力追元觀千古流芳百福同次秦子晉韻淮海文章從古傳誰知後出得先天功成非假三餘力道著元由一大緣葉落花開全妙體鶯吟燕語總旁詮既明物格師東魯麾却南華齊物篇次韻答呂朱李三解元三公未許學三休盛代求賢尚白頭海濶波深鯨吼月天高風緊鶴沖秋功成豈假朱衣助句好寧隨紅葉流難後懷歸無計遺瓦堆草坐誦登樓次韻答古林和尚見寄好山總道占魁場誰解當機不墮常打雨打風還棒辣入泥入水見人長大聲直與雷相挾浚辨難將海比量千古鳳凰臺畔寺禪翁一旦起諸郎次韻答南臺外郎霜華筆舌吐蓮花慚愧香傳到齪家魚鼓敲風甘飯顆燕泥濕雨涴袈裟雞林競市增芝楮鳳沼虗斑待草麻那得扁舟凌素浪同邀陸羽品靈茶次韻答黃雪洲提舉蕪城邂逅古河濆不得煎茶然竹根玉旨𤼭曾承少海金章晚合拜修門獻言要必凌臺陖蘇瘼寧容坐席溫昔日龔黃今日見瑤階佇聽珮聲喧送及藏主歸里日東裴寺相親閲幾秋左探右索出時流機輪三轉輪元淨定慧雙詮慧匪修睡虎耽耽拋故穴遊龍矯矯奮靈湫好翻一滴長江水漲起東方廣海州次韻臘前雪農事多憑三白占臘前喜見片纖纖鶴身怯冷蒙飛絮馬足翹寒困負鹽雲葉有聲敲竹戶天花無蒂散茆簷林間不識田中瑞茶鼎深移傍嶽尖次韻答成元璋鰲寺重迎歲事移圓顱飛絮鬢飛絲蒲帆片片遮紅日楓木蕭蕭減翠時山月藏雲分曙色江濤翻雪洗秋悲甕城斫額蕪城阻多謝情人重寄詩次韻答靈巖欣藏主江居舊見固多才無若新知獨俊哉鐵錫飛從瀛海至金文傳自竺天來箭涇掬月雨初霽香徑尋春雪未開那得投間追勝踐塤箎迭作古琴臺補藏經頌軸衡陽干將隆真教捐俸迎經歸覺場玉葉半猶穿鐵棘金章獨得固銀槳重重雲影涵江影爛爛霞光奪日光淨治既嚴全法藏群公宜頌美林郎次韻送松壑僉事入京每望吳門眼不間華驄喜報入松關六年白過好風景一夕清談忘歲艱鳳沼相將瞻日角龍章應合破天慳來春約莫二三月還踐盟言迎遠山梅隱逸士棄儒就釋選官選佛孰尤宜盍抖塵勞擇所依杜老句豪非至道董公墨妙豈真機花拈座上旨須究草剗階前志莫違慧日峰高籌室廣秋深期向此中歸次韻答南臺郎中鰲峰頂上望升州雲外霜臺憶日休歲熟豈干芻狗力時清那許木鵝流潮聲撼碎一江月樹色裝成萬壑秋大塊氣嚴才氣並青鞋莫忘踐天遊桃源憶故人題淵明圖利名如屣都拋棄那肯折腰塵世三徑菊黃松翠多少間情意一瓢濁酒忘天地誰識這般風味𢬵取百年沉醉身外無餘事少年遊次韻送薩經歷鶴林雲冷鴈橫秋鳥府客難留淮岸山青海門浪白蘭棹去悠悠燕南不比江東近詩句寄來不一榻松風半窗蘿月夢到驛邊樓贈陳漢翁方士神眼能靈鑑相逢渡口船長房徒縮地鄒衍謾談天象緯分諸掌牛腰載巨篇却言老禪衲耳遠更饒年總師仁山公分填常潤二郡方外群英祖之以什且承不以城市山林有間枉遣垂教非惟識公文武才備抑豫獲攬蒙益尤多然虗辱可乎謾勉扶憊綴言卷末以致敬服之懷云北固毗陵連望郡分符兼填自英豪尊前迅辨奪三史幄內良籌空六韜嶽器盍更農器用騷壇可並將壇高全吳共慶無危阽羽翼南藩有鳳毛造寺化疏并序寺乃東晉大寧間裴公祖師所建至梁大寶末及唐之會昌故宋建炎初已嘗三遭劫火若今之火衆屋不存二塔亦毀豈應郭璞四劫之讖乎伏以長江東去山猶砥柱屹中流大教西來寺化劫灰歸下土佛不逃於定業人那免於讖言但得財用足而食用全即看匠力集而功力就櫩牙插星斗一新梵剎環裹於鰲頭輪影亂龜魚雙朵浮圖光分於龍角復追南徐之風月益壯北闕之山河謹疏常州華藏寺大后壽星殿及經閣鐘樓化疏華藏含攝重重之剎海法界全彰太湖管領浩浩之風煙壽宮宜闢消得纏腰十萬貫佇看芘日百千間玉偈雜金文勝壓石渠之祕典瓊樓接銀漢聽敲霜月之洪高檀度集祥楓宸衍算帝師堂下五州寺起造疏山控五州廣納幾多風月寺移兩度積荒五十春秋帝師作主務鼎新宰相贊緣期復舊求之與之不吝芝楮力大解化蓮華宮明哉良哉載歌椿算數綿永培楓階壽顒長老住鶴林諸山疏禪宮類久著敗碁慨無出手者宗綱猶欲壓纍卵俟有興心人論既共歸進母固讓某人法得北山北固道弘西竺西吳面皮刮得霜盍開馬素舊閉之門戶筆頭鑽破紙宜翻龍華故祀之郊詞句續半日間偈聯五葉秀黃鶴黃花未老儘堪助發般若之玄談赤幟赤水無殊亦可互揚罔象之勝義諸封增色季運延光沙彌十一歲化庵疏青山有約種松道者重來白水無涯擲釣兒郎再現剗草機緣既符古昔縛茆門戶要拓今時萬金不吝傾囊一默儘堪報德亂雲堆裏何妨入草求人閙市門頭普請撥塵見佛燈傳千古焰壽祝一人尊孝感請正長老諸山疏金翅擘海已具吞龍之威乳虎墮胎便有食牛之氣如是逸類宜出為人某人滄海元孫長溪嫡嗣語妙吐藏裏摩尼五色眼明耿眉間寶劒孤光法海簸狂瀾百川佇看障回於既倒宗綱如朽索諸峰共倚扶救於將頽太起孝感仁祠廣闢臨濟祖域夾岡接待化疏暮雨濕行裝忍聽數聲泥滑滑春流鳴過櫓厭看兩岸柳絲絲青煙絶處要選住場白水窮邊庶有歸所精糧不匱任大地人如返故家棟宇既完雖小庵兒儘含法界二嚴報施三祝輸忠三山龍王堂化疏龍會三山上宇半摧於下土蟬聯萬戶內藏多足於外財求之歟與之歟出乎爾返乎爾天瓢大注何殊雨玉而雨珠水殿翻新尤勝美輪而美奐成功不日報施有秋南報恩化四大部經疏南山一新巨剎殆冠江城西竺四大部經足包海藏黃金輸捨不吝白城翻出何難印板上脫來字字光吞於銀漢函櫥中盛却重重勢壓於石渠永闡萬葉芳猷普集衆檀善福禪慧玉長老住天竺乃其師開山鎮江諸山疏楚弓楚得可堪墮他掌握中趙璧趙歸必須入家懷袖裏況幹蠱才備毋撝謙力辭某人眼照人天胸吞藏海頽波曾起於楊子初步早試於黃橋弟應兄呼宜續吹塤吹篪翻古調父作子述合追肯基肯堂䇿新功竺天西日佇麾戈吳地北鄰希伐鼓李商主水陸寄庫右語伏以佛稱四生父希覩有若優曇華道為三界尊共蔭無異菩提樹幸逢大教僣展微忱切念某人舟居江河間貨通市肆內荷二儀以蓋載感三光以照臨得遂殖生罔克修報乃設伊蒲崇水陸廣陳兩永晝夜淨儀仍轉法華集桑門總宣百四十四部妙典煉財預託於陰帑分券期證於陽文庶贖現過先愆兼植來因後果伏願世齡益衍家眷咸寧在在興販而常通津祥風順序生生富饒而倍潤屋福海增瀾謹疏祭元叟和尚文佛日普照禪師始自分座雙徑至于起應鳳山中天之命以及晚主五峰之席逾四十年説法利生得度最多知我最久壽登八十有四達世相之匪堅乃輯化權而以至正元年八月四日書偈而入寂越九月三十日遠示遺音金山東庵休居比丘某即於是日就假法堂為位設禮而祭于靈烏乎山之隆隆群木咸植海之淵淵群鱗咸集惟道惟德是似是則今焉已矣曷附曷立老我退藏涕泪交作華林飛霜長魚竄壑天闊江空水雲漠漠一奠憑風斯文何若烏乎尚享祭李檀越文至正二年三月十有四日訃報故檀越李公佐之提舉已卜是月十有四日歸空于姑蘇北關外之新堂鎮江金山禪寺住持釋某感公生前有諾鼎建釋尊之殿雅願未酬不得匍匐即追執紼者後謹備經疏香燭庶奠之儀諉寺之知客僧某代詣神主之前昭告于靈而盡哀悼之禮焉烏乎孔釋並立如月如日疇不載之同旦同夕公博魯書我守竺居名雖有異義固無殊義既不異前盟寧替肯基肯堂諒纍賢嗣楊子滔滔妙峰峩峩豐功倘樹曷已曷磨伏惟尚享祭靖明仁善處士烏呼林高羽集淵深鱗聚猶公靖居厚産薄仕尚善尚仁衆共馳慕嗟我遭屯兼阻江寺不得遇公惟接元嗣施粟施金為法檀度非公善仁曷及乃事仁者宜齡蒼胡奪數幻質匪堅真體元固情寓一辭道存千古伏惟尚享祭龍翔笑隱和尚文大龍翔宗主笑翁和尚壽年六十有一病世虗偽乃以至正四年五月壬子遽委宗柄而歸真寂越八月庚申而以訃聞金山住持某雅服翁徹釋宗之本原兼貫孔李之異旨朝廷搢紳之士所共慕湖海包笠之衆所共歸意者足振斯文而光季運豈謂今也已矣哀朽何堪謹以是月壬戌為位設奠而祭于靈以盡哀焉於乎汶陽不決西秩何平龍河不作西教何弘我託鄰並老亦何成一辭幸起萬象同盟尚享祭甘露無傳和尚文甘露堂上無傳和尚壽享八十有一達生如寄乃以至正丁亥七月十又三日癸丑示歸真寂越十有七日丁巳金山封鄰比丘某敬以香茗果蓏庶饌之奠率衆臨幃而祭于靈以盡五十年餘德誼焉烏乎蘭叢昌昌蕕可並芳琪樹昌昌葭可並蒼我托鄰並彌久彌光今焉已矣如琪隕霜昔者莫復如蘭飄香何以解憂遺續彰彰法幢斯建法綱斯張千秋百代山高水長烏乎尚享祭獨孤和尚烏乎天道與下民相縣能察薄蝕於未形之先者占者之良也聖道與凡下相分能達死生於未變之前者師者之良也若叔兄昔主霅川之天寧武林之鷲峰至於退休峯西之雙松是皆一以是道而參弘之凡下之衆徒窒去來之相而不知道之妙體曾無間於生死也譬諸民下蒙於天道者徒見日月有薄蝕之象豈知天道玄常曾無晦明之殊耶烏乎叔兄有是我故似是一以表同門義一以為來者諭真靈昭昭庶幾鑑哉尚享祭別岸和尚文吳門壽山東堂岸翁和尚以至正八年六月三日順寂于圓通之東庵稟法上首永福西堂以七月二十有四日將命而來金山出其遺音遺儀以下示住持法弟比丘某追念翁壽七十有八少豫二白由其早倡佛慧定智先師之道于義興之芙容常城之天寧郡城之是山晚乃養高于是庵開利學衆曾不倦誠得並其而弘宗故以兄禮而讓之今也既寂老懷何堪敬以二十有七日扶憊為位設奠而祭于靈以盡同門昆季之義焉烏乎絃絶朱絲鸞膠可續珠遺赤水罔象可求惟師之道危若綴旒我衰我獨曷紹宗猷殘星橫曉殘月橫秋餘光有幾翁兮鑑不哀哉尚享祭焦山桂提點文焦山提點法兄月巖公壽享七十有七以至正九年己丑二月九日庚午順寂于德善之蘭若越十二日癸酉金山住持法屬比丘某敬以香燭湯茶果蓏庶饌之奠帥衆臨幃諷誦拜首而祭于靈烏乎昔者焦寺競席如覆局之敗碁公獨出手以救之久焉遂匡丘隴祠虗如暗室之入夜公獨續焰以嚴之久焉遂張邇者寺産夙遺如弱敵之遭強公獨賈衆叶力以復之久焉遂昌至於庶務紛集如凍蝟之寒芒公獨恕己徇機以決之久焉遂臧是功是德曷泯曷亡我託鄰並尤叨餘光烏乎狎勢要者內顧必以權狎市賈者內顧必以利利狎易衰權狎易變若公外贊數代之良師內敦群衲之宏義雖處生死之衰變何能傾奪哉矢詞是白公盍我格既格既白何假銘刻尚享祭曇芳和尚大龍翔宗主廣慈圓悟禪師壽享七十有四達世相之匪堅乃以至正八年十月二十有八日而入寂越明年二月十有八日法姪少室上主稟命遷臨金山出遺音遺儀而示及法弟某謹以是日為位設奠拜首而祭于靈烏乎群動之集必宗於海群植之産必宗於嶽若師早由新亭而遷鍾山由鍾山而登雙徑晚讓雙徑而補龍河四坐道場幾五十載湖海包笠之衆宗之曾無虗往者朝野車騎之衆宗之曾無虗還者師門賴張宗門賴振何盛如焉今也已矣衰獨何堪耶烏乎燈明既絶注之以膏花焰可續鏡明既昏摩之以藥淨光可復師靈昭昭能憫宗門師門二俱牢落不俟於他而可復作乎忍言及是幸鑑之哉尚享靜上人之京師序古聖在位必有賢者趨集其時而為顯用焉若黃帝堯舜夏后周文成康之聖則有巢閣止庭儀韶之鳳負文之神龜鳴岐之鸑鷟在郊藪之麒麟殊類而應之故顯於時者則有六相四嶽八元八凱九官二南之賢至於更代繼聖或有應之趨之者不過率猶是也欽惟皇帝文明英武一統綏服相兼群賢傳得帝師若聖之應則有栴檀古佛延光于京師天人殊類咸仰利然以昔之視今隆治何如哉且昔之應者殊類也群賢趨之尚蒙顯用而況今者應之以佛尤為天人殊類所共仰苟有異業之士以時而趨之豈得志不速成而道不大達也耶福唐默堂上人學富而詩工早遊方外久寓金山嘗掌內典因閲優闐王刻栴檀象遺事有激于中故願趨京致膜拜于古佛之真儀求妙法于帝師之堂下及觀聖德之光明宮闕之崇麗冠蓋之衆多文物之華耀玉帛之富饒禮樂之備至以發其蘊以利其業以成其志以達其道猗歟盛哉龍騰于淵而山川出雲虎嘯于野而巖壑生風行矣適際斯時焉群公既壯以詩豫辱鄉曲也故贈以序云題五尊宿書卷鳳瑞物也昌期則現昏代則隱或墮一毛於林間池上有得之者猶為希世之瑞祕而珍之況多得乎今觀故宋村僧橘洲石橋浙翁天目五先德遺語編次為軸殆乎鳳毛集瑞粲粲然照耀八表之窗几琅琅然省發群學之耳目如使時出益加披究言外之旨歸得不回宗教於季運而復昌期耶視鳳之毛抑豈足為世瑞哉珍之宜矣跋密庵和尚嗣法書玉蘊荊山非卞和別之不能以自白珠沉赤水非罔象得之不能以自表先中峯老祖復廣福安長老嗣法書詞嚴旨密殆乎玉之蘊山珠之沉水今為日東榮首座得之其非具明宗之眼探玄之手有加於卞和罔象何能及是耶跋獨孤為華藏別岸和尚上堂百川學海而至于海古子書之語也若華藏海重重無盡當從何學而可至耶噫先靈隱孤翁為華藏岸翁上堂遺語具在能從是學殆庶幾焉南雄魏處士集金剛經衆解跋天地之有山海高深者一氣融結而致狀貌斯分也釋尊之受善現諸法者一心流出而致文教斯立也心無相非文教莫能顯氣無形非狀貌莫能彰氣不異心心不異氣肇論云天地與我同根萬物與我一體者信不欺矣南雄魏處士文英夙植德本勤饒益行廣釆諸德共詮般若文教衆説捐財鋟梓期永流傳苟現世異代同志衆士熟覽而精究之不外天地根而同證金剛體不外金剛體而同圓天地根則處士之本願庶幾其酬也如其否乎豈處士之本願哉勉焉大金東庵真濟二老手帖跋金時名師東庵真濟二老遺墨日東無夢首座出以示及豫得寓目焉烏乎漢更新室僅三十年父老見光武軍容之異猶歎曰不圖今日復見漢官威儀皇朝更化車書混一歲數倍之彼時二老文華之異今日見之得不與見漢官威儀同一感歎耶題東山長老法雲送行卷後富貴送人以金仁者送人以言此孔子去周老子送之云爾今東山去焦山應法雲命玄隱翁偕山之主會中衆士各出章句以送之殆與孔老之謂同義噫水月流輝海門增色法雲布影少室回春宜在斯人焉圓伊庵記紫金山之耆英章權管文叟偕姪廣提點天岸共出己資佃屯地造叢屋于草場灣之麓功成不自有回舍而及豫期為身後卜此與同歸以表不背生死義感其意真故納之昔巖頭先德發明涅槃伊字教義有三眼語垂示學衆未有能圓之者今豫他日與二公異域而同歸非全生死義即圓字三眼之義也宜以圓伊而名庵嗣燈徒屬毋墜厥始乃得矣至正五年歲次乙酉十月辛亥朔十有四日甲子五十四代住山釋某記靖明居士捨鈔蓋殿薦二親記佛之垂教利世度門有六檀度其一也世有信是門捐財以植福者何果不圓耶姑胥城居回回氏藏吉沙祖出西土由其父納速刺丁中奉早官南晚參江西省政秩滿來吳遂就家焉父既沒子藏吉沙追念劬勞德重莫克修報過金山覩佛之殿廢卜興因損財若干以相成母劉揚氏期鈞勝果而畢為子之孝志烏乎若藏吉沙世固戴天為心今乃回天心以合佛心助財興殿圖報罔極期二親即出生死之表而承勝善福力同超梵天之上享世出世間妙樂宜如佛説七福田真典首章之文無疑矣抑亦可與蓼蓼者莪之什同韻而傳於無窮來者加勸焉西資海印禪寺記毗陵古郡也郡有門曰石幢者乃舊有經幢在是而得名亦古也山木環屏河流曳帶豈羶祠腥宇足稱之耶天曆己巳蘇之録事張承事了無公暇日閲內典悟應無所住之旨遂休官卜家于幢之淨方以道而高居從郡之天寧寺主永寧乞名曰道實化其母魏氏妙元偕眷聚各冠道冠服道服茄素禮念而歸佛乘又造一體三寶圖及善惡諸圖等期啓未悟之衆五臺彌陀寺主如璘服其作因以進呈帝師深加歎焉後至元戊寅奉法旨改家曰西資海印禪庵隨改曰寺及賜金襴袈裟褒以佛心海印了義真空普鑑禪師號凡授法旨有四皆昭令德也至正癸未禮紫金山之寺主契了為師以下髮付衣拂以表信度弟子二以承業曰正宗曰正智市田八十六畝有奇及基地通蔬圃三十一畝有奇為衆者居止食鉢熏炬之儲然又慮久不繼諸封碩德僉用實之願言申寺于分治之教省別選十方之傳持實則不取元功也烏乎古之諸祖皆由甲乙更十方故傳之益綿歷今實亦更甲乙為十方傳以答君親之隆德是即規古法也承傳之者苟如其願廣延奇衲大倡圓音各俾契旨於言前等共弘宗於教外焰續法燈之不息派疏道源之不竭抑實之始願庶幾其酬不徒應以宰官居士比丘身巧運多智示諸法相而開利現在未來之者矣傳者宜加知勸焉實之先世出自濟南鄒平縣後遷益都濰州北海縣之下泊村父永康尹為邑殊有聲母恭人學佛已有成其行實具見于別録若實既全力以肇寺全孝以奉親則又全忠以報國可記也歌以系之曰雲山兮蒼蒼河水兮湯湯何古何今兮常演贊萬年壽聖兮超虞唐大鑑禪師舍利塔銘并序佛之為道以心為宗身有滅沒心無變遷圓裹十虗而不逼者心之體也普應群機而不膠者道之用也凡生有識者悉皆具之豈居異域習殊俗者不有心之與道乎達磨大師自乾竺傳是道而來震旦以裨梁巍卒弘五宗羅什法師亦自西傳是道而來東土以裨姚秦卒弘三藏大鑑禪師今自大元傳是道而之日本期弘佛宗裨國化豈外古耶師諱正澄字清拙福唐連江邑劉氏子世業儒母孫氏夢僧伽授以神珠有娠咸淳甲戌正月十三日生白光滿室幼敏不群至元丙戌年十三父母知其志送依城南之報恩圓公月溪師下髮既受具即參方造杭之淨慈慧公愚極師之室語契機俾執侍極入寂寶公方山師補處改典法藏職滿巡禮至袁之仰山陵公虗谷師嘉其造詣延以第一座谷遷徑山熙公晦機師嗣席舉以雞足出世倡極之道立三關語透者難之既謝事復吳淞省其同母兄印公月江師于真淨因留以養高泰定丙寅三月日本慕其道聘以法禮舟由高麗遭風濤變師惟長哦自若以安衆心天為開霽是年十一月達相州館于建長正中丁卯正月使請開法百辟交會群衲交參故者更新廢者並舉帥府為施賀積莊田而廣食鉢又給山前官地以為菟裘榜曰禪居庚午移金山之淨智明年補瑞鹿之圓覺皆改前作建武癸酉文保聖主復寶位敕關東道起師住都城之建仁法化尤加建長丁丑復敕主瑞龍之南禪召對稱旨前羽林征夷武衛大將軍與其仲氏左典廄源公及諸僚屬咸以師禮而共事公又獨建開善仁祠以報德己卯正月默世匪堅託以衰病引退乃自著表章進謝主上及遺訣諸殿諸檀諸山交舊手書兼垂誡諸徒語尤切至即以是月十七日書偈示衆泊然而逝前典廄藤公既聞亟馳至前泣拜仍張目視之為授戒法衣號即閉目如初龕奉七日顏色如生稟命於禪居舉闍維禮公侯子男緇白士庶莫不哀慕追送如失怙恃火餘設利五色大如菽者不以數計塔于建長諡曰大鑑烏乎師自元國至本國六坐道場包笠共咨之者無虗往車騎共扣之者無虗還慧珠應現又若爾得不為嗣佛宗降國化者之良師歟俗壽六十有六僧臘五十有三依法祝髮稟戒弟子人總若干豫與師生同里傳同宗弟子堅瑤出師事狀以請銘故不讓勉為核其要者序而銘之銘曰猗歟覺皇善啓覺場炎炎三界濯以清涼幽幽六趣燭以淨光羸羸窮子導以寶方繄大知識得寶王力既贊皇元復昌王國宰執效忠凶頑化德軍旅解嚴安安域雲山蒼蒼雲海茫茫木兮可折水兮可量惟施法雨彌滿八荒澤物無竭壽君無疆國界法界無中無外土廣穹高何載何蓋日東月西何明何昧潭北湘南同小同大骨相斯瘞光相何蔽上貫三辰下徹三際宗嗣繩繩燈傳世世萬祀千靈式呵式衛古山歌太始太素未兆先山之真體已具全盤盤然莫窮其邊際巍巍然莫極其層巔飛走曾不有栖集草木亦不有蔥芊光明照耀不假於日月陰晴開合不涉於雲煙芥子那能納藕絲那能牽太華高高不得並蓬壺朵朵不得聯風雨不能以摩洗春秋不能以變遷巨靈擡手莫分秀夸父盡力莫奪堅嵩丘壁觀坐豈冷鷲嶺説法音常圓耳觀之者乃能解眼聽之者乃能傳海外好山環翠何啻庾多數豈若此山蒼古出自威音前威音面目識不識匡廬詩什箋徒箋它山非古任彼衆者取此山獨古惟應歸仁賢仁賢山立一方雄跨於四嶽千秋萬歲合作砥柱永擎天獨山説天下之山固衆惟群木巨根久蟠於深雪修幹高拂於層雲者匠石得以采之為棟梁風月得以乘之揚清輝羽毛得以集之托巢穴衆山得以讓之為獨長然是山者兼有若爾之外秀猶得獨長於衆山而衆山不得與之並況智過千人才超異等之俊士衆可與之並而不讓之為獨長耶日東俊上人齒茂春秋氣凌吳楚問字於豫豫因酌其名之宜者易以獨山為別稱則又曉之曰今也禪林落落法嶽夷夷苟則是山而求諸己益以才智之內美衆豈舍之得不讓之為獨長以回靈嶽春早之芳序以起少林秋晚之頺風歟之哉龍華悟宗主血書華嚴經華嚴大經八十一卷世之流傳者多以墨本衆少信而義少圓今龍華會主圓悟乃出指血通書全部期與來者傳誦庶信易興而義易圓四恩酬而三有資利不加博乎敬贊以偈鷲峰説得血滴滴龍會今朝又指陳耳處能觀眼處聽雜華開遍百城春化金塑飾佛像寺之大殿已興擬卜塑飾佛之儀像以瞻奉用費不資由是遍叩諸大檀貴門普化金箔每貼統鈔六貫文伏望各推共戴佛光之心隨願樂施或報父母重恩或追悼先遠冥福或祈福壽增延或保疾病痊安或懺現世愆尤或植來生德本當悉如願經云佛滅度後優填王造佛儀像令人見之心生歡喜滅河沙劫生死重罪又云迦葉尊者過去佛時捨金粧佛生生得紫金相又云左肩擔父右肩擔母繞須彌山百千億匝不能報恩惟於佛法中修福是報父母深恩又云為人豪貴大福長壽從禮事三寶布施持戒中來如經所説豈欺語耶幸信偈云釋尊寶殿已興新衆像粧嚴出衆心要得人人圓福果好於佛面賸添金滄海長溪二和尚同幀廣床接席殆類過現二佛之同龕麈尾橫機何異雄峰老祖之再參有是父有是子青於藍出於藍臂力不假屈伸遂回愚公移去之山莖草等間拈起遍現樓閣層雲之端觀堂三宿雷音未動而大開天顏淨壇三啓水陸不分而普會聖凡輪者蹄者過之總停驂包者笠者歸之得指南龍淵派脈倚砥柱而障頺瀾楊岐重任賴袒肩而力荷擔一有多種二無兩般折鰲阜草木為籌而數莫殫翻楊子江水為辨而贊還難從教百世後千載間瞻之仰之永作叢林標格看龍華悟宗主空巖師壽容贊毗陵託質龍華傳宗七處九會攝毫末三乘五教貫胸中混諸緣兮莫雜悟諸法兮本空摩尼顆顆念不異彌陀佛佛體元同子子孫孫宜仰則千秋百代振玄風郭竺隱居士道容羽扇麾三軍豈足為奇勳惟茲汾陽裔善善衆莫群弱歲熟韜略壯年攻梵文輪珠配香鼎雪蘃同清芳松篁衍遐算南極應東雲定國不煩弓矢力法王長護聖明君代疏呈白塔檀主皇元統國四海同宗檀贊化萬法通華文梵語貫胸次南禪北教宜歸公正印單提偏正辨頑石點首森象空圓音一唱雷音振群盲破暗群聵聰凡生既度聖壽衍豈假效彼三呼嵩何當一語為獻可重興江島金仙宮飛樓湧殿冠鰲頂下壓蛟室上摩穹煙帆來往賴安濟水陸香火回祥風妙峰依舊德雲住南詢童子來城東景純懸讖何足記千秋禪侶歌豐功代疏呈宣政院三旦八院使江海之深蛟龍藏山嶽之高松柏蒼霜松可以為棟梁雩龍可以澤亢陽如公厚德兼才良國綱賴振教賴匡慨茲晉寺歷梁唐復越宋元四遭殃景純懸讖何彰彰安得贊力興覺場昭回佛日吞三光永延聖主壽無疆公應臻福猶倍常等山不動江流長更磨崖石勒頌章醴陵行答可齊處士醴陵君子真可人可人可宅湘之濵珍禽清響三更月琪樹芳聯四序春峩峩華蓋蔽穹日一一反掌糜埃塵種瓜逸老本同侶紉蘭醒士宜相親我居雲頂苦蕉額半朝接席忘舊新何當西泝託衡宇千秋長共齊為鄰李知州郭教授石縣尹作畫作字于庫院索題天材拔地匠不收空埋雪壑成乾休李侯郭公識真態寫影肯作山堂留古松古檜對立碧澗莎散髮和湍流新篁擢秀搖翠葆石面突出夜叉頭白日黯慘青煙濕鶴群飛下孤猿愁霜枝缺處露氷柱蝌蚪倔強欺蛟虬向來虗壁木泥土墨香一染金難酬風月長年生六戶大夫封樹空千秋羡君總為廊廟具快我無錢得沃州送隆上人歸閩閩山蒼蒼浙水寒還閩歷浙本間間機先早透石門句句外何有趙州關玄沙徒誇嶺不出指頭𡎺破笑旁觀寶壽更言河不渡腳跟泥水曾未乾普化鈴兒與撲碎何妨揚向𡏖圾間收拾風月杖頭挂大千攝向一毫端紹隆釋種看高作祖師心印作何顏陳逸士臨清軒華軒突兀臨清流銀河倒瀉長涵秋秋光蕩摩無六月火龍卷焰藏雲頭長隄蟠蟠翠蛟舞遠山點點青螺浮柳外漁舟釣殘雪煙中童笛吹涼州五城樓觀阻弱水一天風月滿滄州主人邀客話湖海海上機忘來白漚醉裏濯纓仍濯足古今賢達徒悠悠何時共倚朱欄曲洗我濁清雙眸盡吸浩氣發胸次相羊物表追天遊擬古送陳茂才歸松州萬山松蒼蒼小大凌雪霜根本均一氣何有短與長長者既獲采短者尚投荒豈俟長而碩終焉充棟梁陳生産松郡齒茂才固良況與薛春宮先後同一鄉願言益培植喬喬拔豫章梓匠還重顧曾搆芘四方毋逐桑榆暖榆景宜延光餘光能及遠秋迫回春陽蒼山一首贈雲菩薩蒼山雲白連姑臧凌霄聳壑色寒芒長河西來判涇渭如襟如帶控朔方高人生彼足清氣春秋異色皆文章昔甘挂冠向神武今服田服辭帝鄉教海禪河翻舌本直欲上濕日月光江南江北幾煙浪一葦杭深恣相羊亦欲廣渡迷流衆俱脫沉溺登康莊丈夫浩志有若此吾年望八那敢當但期雲不改山蒼千秋永壯河西疆和月江和尚送哲上人拜祖韻德山見僧有何語腳未跨門棒先舉棒頭敲出玉麒麟鳳舞鸞翔安足數哲禪況出明極翁莫學亂世誇英雄合勉麾戈東海外毋使日轂易西舂西極陰雲障東極直教破散如破敵大明照徹十方空那有諸祖與諸佛謾將塔樣問耽源離説名為不二門靈徑遺蹤在何許休混時流念八還次韻答何山月江和尚神光謂受老胡記大渴如何望梅止更將皮髓盡分張直得渾無卓錐地滿面慚惶歸去來剛言五葉一華開山兄三昧誰能識機如大地藏春雷剨然一震空衆説衲子疑團湯沃雪巨壑何曾却細流千江有水千江月狂瀾倒久復障回小溪從此清於苔五月香浮天瑞雪寒山拾得笑咍咍育上人歸雪峰曾郎育箇落賴兒四七二三莫敢窺百城知識門戶廣門門有路祇獨往德山棒粗非惡辣臨濟聲低休亂喝楊子江頭風月多何妨收拾入禪那禪那本寂何言説風度晴空水流月秋高氣冷木飄丹衲卷寒雲復故山阿師徵問有何得拄杖拗折拋壁角三拜起來立依位可祖同歸尤拔萃六花秀與五葉聯芳傳千古看他年蕭世德雕鏤衆象擬古一首蕭子才良奪天造一木能成百花朵枝枝葉葉玉玲瓏豈少香風生四座龍騰鳳翥尤應祥獅象鬪角威益張金剛座擁須彌頂蓮華內現法中王群靈呵護群魔伏來者再拜罪還福江聲喧殿挾芳聲千秋百代播南北擬古一首題貞節巷松篁冬昌昌抱節凌雪霜桃李競春艷未炎已飄香惟茲胡節婦堅貞欺松篁一子與一女沖幼保閨房既長延師教鱣雜苜蓿長照書眼如日錦繡變肝腸異時功名遂曳紫佩金章雖承母慈力終猶父義方鳲鳩豈配德希瑞等鳳凰願言千秋算孟母同耿光擬昌黎體古風一首代疏上帝師堂下兼呈丞相閣下乞照梁大寶末唐會昌及故宋建炎初例聞奏頒降恩塑佛蓋殿造塔皇元帝師佛法主佛法得主僧得所僧徒得所禪誦勤永贊丕圖傳萬古當今聖主得佛心等視僧民猶赤子干戈偃息泰階平佛剎莊嚴遍寰宇獨嗟江島晉招提劫火一朝化焦土歷推此寺逾千年先已三遭熒惑苦皆由宰輔進嘉言朝庭優恤復元矩況今主法有帝師左輔右弼賢於彼一言獻可帝曰俞衆作立功等彈指巍巍金殿湧波心朵朵浮圖撑雲裏金山增聳培壽丘何假磨崖鐫石鼓祈病安施財塑佛及祖師諸天佛身清淨同秋月祖祖及天體何別普現衆生心水中處處光明常照徹祇緣貪垢壅心源致使病魔作妖孽外財能捨內除貪病自痊安垢清絶圓明妙相即現前慧命延長千萬劫土地開光明惟聖惟神威威靈靈頂眼本正逾日光明良由昧者不能覩今為點出示諸仁江山雙碧風月雙清物物全彰儀象真千秋萬載永護斯教而安斯人觀音菩薩開光明大庾嶺頭一鋪功德用點眼紫金山中一鋪功德亦如然今古應無墜分明在目前雖然祇如大悲千手眼畢竟今朝點那箇眼會麼以筆作點勢云大士大慈開智眼照今照古照天人江山風月增華彩大地含生證法身涅槃堂西方三聖開光明諸德會麼以筆點三點云圓伊三點涅槃義國土三眼什麼義一即三三即一識得一能事畢彌陀觀音勢至全妙色頂門有眼明逾日生死二途俱照徹瞻之仰之福無極觀音贊二大明生東衆暗皆空大悲應世利物亦同寂而非寂草座蒙茸不説而説瓶柳青蔥善聽以眼剎剎圓通猗歟妙智力善救群生苦群苦固有殊救之無彼此譬如月在天光涵一切水水雖有淺深光照無今古以是因緣故名為大悲主草衣文殊贊頂髮垂臂草衣蔽身梵書在手辨假明真真假雙泯如日始晨昏暗破散森象回春不住東際喚起南詢大地狐群俱屏迹出林師子獨嚬呻水陸滿散拈香此香西竺流芳南陔遺韻與彌陀聯枝而出與釋迦並根而生奉為孝男蕭壽山與家眷等爇向寶爐供養十方常住佛十方常住法十方常住僧云云敬薦先考蕭公五四承事先妣張氏一太君均及蕭氏門中內外宗親各符孝懇者伏願各各頓淨於前塵遍現玉毫之相親親等超於上品同圓金色之身問答不録提綱云第一義諦不二法門如天普蓋似地普擎如日普照似雨普滋諸惡由之而滅衆善由之而生百事由之而成萬法由之而立迷此者生死始而凡聖分悟此者輪回息而凡聖同是名真如實際亦名佛果菩提梁皇首建齋壇而渡越水陸群流者即由此法也英公續弘齋教而升濟幽冥多衆者亦由此法也至若今晨齋主追報罔極之恩而施淨財入于金山廣修無遮齋會者豈外此法耶外此法無別心外此心無別法心法兩俱融劬勞即報畢所以教中道天人群生類皆承此恩力是也雖然更有圓滿句子試倩天台木上座為衆舉似光揚勝會卓拄杖一下云一聲振動界三千喚起親親登九蓮功德無邊利無盡現存兼得衍椿年結座云晉代招提號澤心古今信善共傾誠齋修兩晝功尤勝財施千僧德豈輕經轉圓音翻海口燈分真照奪星明親恩報畢更何及福集兒孫代代榮挂新鐘玉樓已立金鐘已成今朝試舉號令更新萬靈仰慶衆苦酸停若將耳聽終難解眼處能聞始是親諸仁者還會麼乃擊一聲云一聲頓空三界夢江山從此播嘉聲乃擊三聲山僧四舍人起靈二十歲江城夏五水天涼清曉蟬聲噪緑楊好箇轉身時節子金山試為指生方故山僧四舍人會麼夭而不朽歲何少壽而不學歲何多詩書舊業未消磨有意重來取甲來合別別雲山蒼蒼江月白潭北湘南元不隔覿面當機覯得親何用當來問彌勒遂撒土冷公提舉掩土古德云萬法總心生諸緣惟性曉本無迷悟人祇要今日了某人會麼四大合成身有身有生死一性本虗寂無今亦無古如水行地中萬古自流注如春回物表百花自紅紫五十五年中用是而興家所以有資有産而殷富五十五年後用是而傳家所以有子有孫而克嗣秀挺金蘭芳聯玉樹是性無有形能成一切義是義如了明即出生死路生死既不迷名住吉祥地如是如是千秋佳氣擁佳城萬頃江光增福聚范氏孺人掩土真際不分男女相迷情妄見有多般百年未半棄榮養豈是真歸起世間某人還達真際理地麼深固幽遠綿歷塵劫而不變不遷虗徹靈通廣納沙界而不中不外春風淡淡山日明菩提一路坦然平春水溶溶林月白解脫一門無壅塞如是而造入即境即真如是而安居全物全神雖然祇如垂蔭兒孫底句必竟又作麼生撒土云勝地不生凡草木葉葉聯芳總蘭玉祝氏孺人掩土佛言見身無實是佛見了心如幻是佛了了得是心如幻即契真常見得是身無實即了無常迷之者乃有男女之殊悟之者曾無聖凡之別故孺人祝氏會麼是身安於堅強故同諸地是身便於潤澤故同諸水是身宜科喝一喝而起潤都寺入塔圓通門戶啓當年春去秋來幾變遷惟是一真曾不變黃金萬煆骨長堅雖然與其顯用於身前豈若歸藏松塢邊江水橫流波印月山容長潤玉生煙何假從他求塔樣湘南潭北本如然圓寂觀音庵開山潤公無澤都寺到這裏莫留連快把跛驢加著鞭翻身更進毗盧顛扶起韶陽孫獨秀千秋彈壓老耽源圓副寺撒骨圓副寺算箇自計圓木自針總間骨董可與平沉放骨云無雲生嶺上有月落波心顏居士掩土世人多背道觸事生煩惱擾擾無寧時何殊蟻旋磨惟是顏大光不逐衆顛倒自幼持清齋年高不退墮日日誦佛書念念稱佛號有子亦善傳諸孫同所造譬如登寶山到者俱得寶西方路豈遙今日已親到到後又如何勝地無凡草粲粲黃金花九品千萬朵撒土龍華會月江庵主掩土龍華真界無邊畔造入之者骨須換滿公善友丰骨殊不待餘言能自判如是如是七十年來從緣而入道自得鼻祖之化德一十六年誅茆而創業足闡慈氏之玄風七子八孫同正受十方如來共圓覺所以永嘉大師有云一性圓通一切性一法遍含一切法一月普現一切水一切水月一月攝諸佛法身入我性我性還共如來合別別雲山蒼蒼江月白潭北湘南元不隔覿面當機覯得親何用當來問彌勒遂撒土冷公提舉掩土古德云萬法總心生諸緣惟性曉本無迷悟人祇要今日了某人會麼四大合成身有身有生死一性本虗寂無今亦無古如水行地中萬古自流注如春回物表百花自紅紫五十五年中用是而興家所以有資有産而殷富五十五年後用是而傳家所以有子有孫而克嗣秀挺金蘭芳聯玉樹是性無有形能成一切義是義如了明即出生死路生死既不迷名住吉祥地如是如是千秋佳氣擁佳城萬頃江光增福聚范氏孺人掩土真際不分男女相迷情妄見有多般百年未半棄榮養豈是歸真超世間某人還達真際理地麼深固幽遠綿歷塵劫而不變不遷虗徹靈通廣納沙界而不中不外春風淡淡山日明菩提一路坦然平春水溶溶林月白解脫一門無壅塞如是而造入即境即真如是而安居全物全神雖然祇如垂蔭兒孫底句必竟又作麼生撒土云勝地不生凡草木葉葉聯芳總蘭玉祝氏孺人掩土佛言見身無實是佛見了心如幻是佛了了得是心如幻即契真常見得是身無實即了無常迷之者乃有男女之殊悟之者曾無聖凡之別故孺人祝氏會麼是身安於堅強故同諸地是身便於潤澤故同諸水是身宜於溫燠故同諸火是身利於動轉故同諸風風性動故有靜火性炎故有息水性潤故有竭地性堅故有崩地水火風假合是身既歸無常圓明真淨微密妙心信元不昧湛然而不染廓然而無際寂然而長照卓然而長靈用是而治內故善興家之慈教用是而接外故得備體之淑儀若子若女若孫雖衆多式撫式字式立惟均一鳲鳩配德豈足並天麟符瑞真可奇與麼與麼七十五年前已與七賢聖女同證不生生之玄門七十五年後即與法華龍女同歸不死死之樂剎不與麼不與麼江山面面拱佳城永福兒孫振戶庭佛殿上梁文山冠吳頭直立擎天之一柱江銜楚尾平欺吞海之群鯨眷茲絶勝覺場實為吉祥福地乃興金殿希還寶坊敬惟十方緇白諸大施主富潤出前修賢貴拍先輩能聚能捨有作有成各具插草大機頓掃四劫之懸讖兼得拈花密旨喜瞻一會之靈山既全主而全賓尤美輪而美奐宜陳善頌用扛修梁拋梁東駕海紅輪轉妙峰大地群俱照徹森羅萬象莫逃蹤拋梁西廬阜分青到水湄何假種蓮續芳事川光照戶郎花池拋梁南勝友初參自此門古往今來道何異德雲現住妙高山拋梁北遙拱天庭瞻日角經宣衆口香一爐永祝皇元贊皇覺拋梁上日月星辰垂瑞象周遮不有震凌虞普請長瞻玉毫相拋梁下群類無依今有藉既承恩力仰帡幪盍各進修隆法化伏願上梁之後棟宇彌堅風月增勝山門檀門並振廣納五湖四海之禪流佛運國運同昌永延萬歲千秋之睿算日東及藏主相親歲久今卜東歸出其自侍香至典教後録得豫之應答時機雜著凡若干篇目曰拾遺集徵題卷末以將行噫世所珍者金珠也豫言豈勝之耶倘識者見是不以拾礫春池之謂而誚及庶幾得之矣皇元至正十年庚寅春紫金山八十有二老人
